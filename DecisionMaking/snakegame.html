<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game 🐍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        #gameCanvas {
            background-color: #000;
            border: 3px solid #00FFFF;
            display: block;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .info-panel {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 8px;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            gap: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
            justify-content: center;
            min-width: 400px;
        }

        .score-item {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .score-label {
            color: #666;
            font-weight: normal;
        }

        .score-value {
            color: #00FFAA;
            font-size: 18px;
        }

        .controls {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 8px;
            color: #333;
            text-align: center;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            min-width: 400px;
        }

        .controls p {
            margin: 5px 0;
        }

        .controls .highlight {
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            #gameCanvas {
                max-width: 90vw;
                max-height: 90vw;
            }

            .info-panel, .controls {
                min-width: auto;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="info-panel">
            <div class="score-item">
                <span class="score-label">Score:</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">High Score:</span>
                <span class="score-value" id="highScore">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Speed:</span>
                <span class="score-value" id="speed">1</span>
            </div>
        </div>

        <div class="controls">
            <p><span class="highlight">↑ ↓ ← →</span> Arrow Keys to Move</p>
            <p><span class="highlight">P</span> to Pause/Resume</p>
            <p><span class="highlight">SPACE</span> to Restart Game</p>
            <p>Eat <span class="highlight">❤</span> to grow and increase score</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const TILE_SIZE = 20;
        const TILES_X = canvas.width / TILE_SIZE;
        const TILES_Y = canvas.height / TILE_SIZE;
        const INITIAL_DELAY = 100;

        // Game variables
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let gameOver = false;
        let paused = false;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let foodEaten = 0;
        let shouldGrow = false;
        let collisionType = '';
        let gameLoopId = null;
        let currentDelay = INITIAL_DELAY;

        // Initialize game
        function initGame() {
            snake = [
                { x: Math.floor(TILES_X / 2), y: Math.floor(TILES_Y / 2) },
                { x: Math.floor(TILES_X / 2) - 1, y: Math.floor(TILES_Y / 2) },
                { x: Math.floor(TILES_X / 2) - 2, y: Math.floor(TILES_Y / 2) }
            ];
            spawnFood();
            startGameLoop();
        }

        // Spawn food at random location not on snake
        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * TILES_X),
                    y: Math.floor(Math.random() * TILES_Y)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        // Get current delay based on speed
        function getCurrentDelay() {
            const speedBonus = Math.floor(foodEaten / 3) * 2;
            return Math.max(40, INITIAL_DELAY - speedBonus);
        }

        // Move snake
        function moveSnake() {
            const head = snake[0];
            let newHead = { ...head };

            switch (direction) {
                case 'RIGHT':
                    newHead.x++;
                    break;
                case 'LEFT':
                    newHead.x--;
                    break;
                case 'UP':
                    newHead.y--;
                    break;
                case 'DOWN':
                    newHead.y++;
                    break;
            }

            snake.unshift(newHead);

            if (!shouldGrow) {
                snake.pop();
            } else {
                shouldGrow = false;
            }
        }

        // Check collisions
        function checkCollisions() {
            const head = snake[0];

            // Check wall collision
            if (head.x < 0 || head.x >= TILES_X || head.y < 0 || head.y >= TILES_Y) {
                console.log(`Wall collision! Head at (${head.x}, ${head.y})`);
                collisionType = 'HIT WALL';
                gameOver = true;
                return;
            }

            // Check self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    console.log(`Self collision! Head at (${head.x}, ${head.y}) hits body segment ${i}`);
                    collisionType = 'HIT YOURSELF';
                    gameOver = true;
                    return;
                }
            }
        }

        // Check food collision
        function checkFoodCollision() {
            const head = snake[0];
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                foodEaten++;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                shouldGrow = true;
                spawnFood();
                updateUI();
            }
        }

        // Update UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('speed').textContent = Math.floor(foodEaten / 3) + 1;
        }

        // Draw game
        function draw() {
            // Clear canvas with black
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILES_X; i++) {
                ctx.beginPath();
                ctx.moveTo(i * TILE_SIZE, 0);
                ctx.lineTo(i * TILE_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= TILES_Y; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * TILE_SIZE);
                ctx.lineTo(canvas.width, i * TILE_SIZE);
                ctx.stroke();
            }

            // Draw boundary
            ctx.strokeStyle = '#00FFFF';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width - 1, canvas.height - 1);

            // Draw snake body
            ctx.fillStyle = '#00AA00';
            for (let i = 1; i < snake.length; i++) {
                ctx.fillRect(
                    snake[i].x * TILE_SIZE,
                    snake[i].y * TILE_SIZE,
                    TILE_SIZE - 1,
                    TILE_SIZE - 1
                );
            }

            // Draw snake head with emoji
            const head = snake[0];
            ctx.fillStyle = '#FFFF00';
            ctx.fillRect(
                head.x * TILE_SIZE,
                head.y * TILE_SIZE,
                TILE_SIZE - 1,
                TILE_SIZE - 1
            );

            // Draw snake head emoji
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(
                '😁',
                head.x * TILE_SIZE + TILE_SIZE / 2,
                head.y * TILE_SIZE + TILE_SIZE / 2
            );

            // Draw food
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(
                food.x * TILE_SIZE,
                food.y * TILE_SIZE,
                TILE_SIZE - 1,
                TILE_SIZE - 1
            );

            // Draw food emoji
            ctx.font = '12px Arial';
            ctx.fillStyle = '#FFFF00';
            ctx.fillText(
                '❤',
                food.x * TILE_SIZE + TILE_SIZE / 2,
                food.y * TILE_SIZE + TILE_SIZE / 2
            );

            // Draw paused message
            if (paused && !gameOver) {
                ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFFF00';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '14px Arial';
                ctx.fillText('Press P to Resume', canvas.width / 2, canvas.height / 2 + 20);
            }

            // Draw game over message
            if (gameOver) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FF0000';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

                ctx.fillStyle = '#000';
                ctx.font = '18px Arial';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2);
                ctx.fillText(`High Score: ${highScore}`, canvas.width / 2, canvas.height / 2 + 30);
                ctx.fillText(`Reason: ${collisionType}`, canvas.width / 2, canvas.height / 2 + 60);

                ctx.font = '14px Arial';
                ctx.fillText('Press SPACE to Restart', canvas.width / 2, canvas.height / 2 + 90);
            }

            // Draw instructions at start
            if (score === 0 && !gameOver && !paused) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '12px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('Arrow Keys: Move | P: Pause', 10, 10);
            }
        }

        // Game update
        function update() {
            if (!gameOver && !paused) {
                direction = nextDirection;
                moveSnake();
                checkCollisions();
                checkFoodCollision();

                // Adapt speed
                currentDelay = getCurrentDelay();
            }
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
        }

        function startGameLoop() {
            if (gameLoopId) clearInterval(gameLoopId);
            gameLoopId = setInterval(gameLoop, currentDelay);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();

            // Direction controls
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'DOWN') nextDirection = 'UP';
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction !== 'UP') nextDirection = 'DOWN';
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction !== 'RIGHT') nextDirection = 'LEFT';
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction !== 'LEFT') nextDirection = 'RIGHT';
                    e.preventDefault();
                    break;
            }

            // Pause control
            if (key === 'P' && !gameOver) {
                paused = !paused;
            }

            // Restart control
            if (key === ' ' && gameOver) {
                e.preventDefault();
                restartGame();
            }
        });

        // Restart game
        function restartGame() {
            snake = [];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            foodEaten = 0;
            shouldGrow = false;
            paused = false;
            gameOver = false;
            collisionType = '';
            currentDelay = INITIAL_DELAY;
            updateUI();
            initGame();
        }

        // Start game on page load
        window.addEventListener('load', () => {
            updateUI();
            initGame();
        });
    </script>
</body>
</html>
